<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cancionero Bloc</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body { font-family: monospace; padding:10px; }

#barra {
  background:#ddd;
  padding:5px;
  margin-bottom:10px;
}

#editor {
  width:100%;
  height:70vh;
  font-size:16px;
}

#visor {
  border:1px solid #ccc;
  padding:10px;
  margin-top:10px;
  white-space: pre-wrap;
}

.cancion {
  padding:5px;
  border-bottom:1px solid #ccc;
}
</style>
</head>

<body>

<h2>📝 Bloc + Cancionero</h2>

<div id="barra">
  <button onclick="nuevo()">Nuevo</button>
  <button onclick="guardar()">Guardar</button>
</div>

<input id="titulo" placeholder="Título"><br><br>

<textarea id="editor"></textarea>

<hr>

<h3>Cancionero</h3>

<div id="canciones"></div>

<div id="visor"></div>

<br>
<button onclick="editar()">Editar</button>
<button onclick="borrar()">Borrar</button>

<script>
// FIREBASE (NO SE TOCA)
const firebaseConfig = {
  apiKey: "AIzaSyBluLvO5UfzfMcadDfKtr30U3jhxsfBJKQ",
  authDomain: "cancionero-f0c5b.firebaseapp.com",
  projectId: "cancionero-f0c5b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let actualID=null;
let actualData=null;

// nuevo
function nuevo(){
  if(confirm("¿Borrar todo?")){
    editor.value="";
    titulo.value="";
  }
}

// guardar
function guardar(){
  let t = titulo.value;
  let texto = editor.value;

  if(!t || !texto) return;

  db.collection("canciones").add({
    titulo: t,
    texto: texto
  });

  editor.value="";
  titulo.value="";
}

// lista
db.collection("canciones").onSnapshot(snapshot=>{
  canciones.innerHTML="";

  snapshot.forEach(doc=>{
    let d=doc.data();

    let div=document.createElement("div");
    div.className="cancion";

    div.innerHTML=`<b>${d.titulo}</b>
    <button onclick="ver('${doc.id}')">Abrir</button>`;

    canciones.appendChild(div);
  });
});

// ver
function ver(id){
  db.collection("canciones").doc(id).get().then(doc=>{
    actualID=id;
    actualData=doc.data();

    visor.innerText = actualData.texto;
  });
}

// borrar
function borrar(){
  if(!actualID) return;
  db.collection("canciones").doc(actualID).delete();
  visor.innerText="";
}

// editar
function editar(){
  if(!actualID) return;

  titulo.value = actualData.titulo;
  editor.value = actualData.texto;

  db.collection("canciones").doc(actualID).delete();
}
</script>

</body>
</html>
