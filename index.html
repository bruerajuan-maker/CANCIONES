<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cancionero PRO</title>
<style>
body { font-family: Arial; padding: 20px; }

.linea {
  position: relative;
  margin-bottom: 30px;
}

.letra {
  font-size: 18px;
}

.acorde {
  position: absolute;
  top: -20px;
  color: red;
  font-weight: bold;
}
</style>
</head>
<body>

<h2>🎸 Editor de canciones</h2>

<div class="linea" onclick="agregarAcorde(event)">
  <div class="letra">Hoy te vi pasar</div>
</div>

<script>
function agregarAcorde(e) {
  let acorde = prompt("Acorde:");

  if (!acorde) return;

  let nuevo = document.createElement("div");
  nuevo.className = "acorde";
  nuevo.innerText = acorde;

  nuevo.style.left = e.offsetX + "px";

  e.currentTarget.appendChild(nuevo);
}
</script>

</body>
</html>
