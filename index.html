<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cancionero</title>
<style>
body {
  font-family: Arial;
  padding: 20px;
}

input {
  padding: 10px;
  width: 70%;
}

button {
  padding: 10px;
}

.resultado {
  margin-top: 10px;
  padding: 10px;
  border-bottom: 1px solid #ccc;
  cursor: pointer;
}

#letra {
  margin-top: 20px;
  white-space: pre-wrap;
}
</style>
</head>
<body>

<h2>🎸 Cancionero</h2>

<input id="busqueda" placeholder="Ej: soda stereo">
<button onclick="buscar()">Buscar</button>

<div id="resultados"></div>
<div id="letra"></div>

<script>
async function buscar() {
  let q = document.getElementById("busqueda").value;

  let res = await fetch("https://api.lyrics.ovh/suggest/" + q);
  let data = await res.json();

  let html = "";

  data.data.slice(0, 10).forEach(c => {
    html += `<div class="resultado" onclick="ver('${c.artist.name}','${c.title}')">
      ${c.artist.name} - ${c.title}
    </div>`;
  });

  document.getElementById("resultados").innerHTML = html;
  document.getElementById("letra").innerHTML = "";
}

async function ver(artista, tema) {
  let res = await fetch(`https://api.lyrics.ovh/v1/${artista}/${tema}`);
  let data = await res.json();

  document.getElementById("letra").innerText =
    data.lyrics || "No se encontró la letra";
}
</script>

</body>
</html>
