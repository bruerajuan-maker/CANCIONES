<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mi Cancionero</title>

<style>
body { font-family: Arial; padding: 10px; }

.tabs button { padding: 10px; margin: 5px; }

textarea {
  width: 100%;
  height: 350px;
}

.cancion {
  padding: 5px;
  border-bottom: 1px solid #ccc;
  cursor: pointer;
}

#contenedor {
  display: flex;
  gap: 20px;
}

#visor {
  flex: 2;
  white-space: pre-wrap;
  border: 1px solid #ccc;
  padding: 10px;
  height: 400px;
  overflow-y: auto;
}

#imagenes {
  flex: 1;
}

img {
  max-width: 100%;
  margin-bottom: 10px;
}

.acorde {
  color: red;
  font-weight: bold;
}

</style>
</head>

<body>

<h2>🎸 Mi Cancionero</h2>

<button onclick="tab('editor')">Editor</button>
<button onclick="tab('lista')">Cancionero</button>

<!-- EDITOR -->
<div id="editor">
  <input id="titulo" placeholder="Título"><br><br>
  <textarea id="texto"></textarea>

  <p>📷 Pegá imágenes con CTRL + V</p>

  <button onclick="guardar()">Guardar</button>
</div>

<!-- LISTA -->
<div id="lista" style="display:none;">

  <div id="canciones"></div>

  <hr>

  <div id="contenedor">
    <div id="visor"></div>
    <div id="imagenes"></div>
  </div>

  <br>

  <button onclick="editar()">✏️ Editar</button>
  <button onclick="borrar()">❌ Borrar</button>

</div>

<script>
let canciones = JSON.parse(localStorage.getItem("canciones")) || [];
let actual = null;
let imgsTemp = [];

// cambiar pestañas
function tab(t){
  document.getElementById("editor").style.display = t==="editor"?"block":"none";
  document.getElementById("lista").style.display = t==="lista"?"block":"block";
}

// guardar
function guardar(){
  let titulo = document.getElementById("titulo").value;
  let texto = document.getElementById("texto").value;

  if(!titulo || !texto) return;

  canciones.push({titulo, texto, imgs: imgsTemp});
  localStorage.setItem("canciones", JSON.stringify(canciones));

  imgsTemp = [];
  document.getElementById("titulo").value="";
  document.getElementById("texto").value="";

  mostrar();
}

// mostrar lista
function mostrar(){
  let html = "";

  canciones.forEach((c,i)=>{
    html += `<div class="cancion" onclick="ver(${i})">${c.titulo}</div>`;
  });

  document.getElementById("canciones").innerHTML = html;
}

// ver canción
function ver(i){
  actual = i;

  let c = canciones[i];

  document.getElementById("visor").innerHTML =
    c.texto.replace(/\[(.*?)\]/g,'<span class="acorde">[$1]</span>');

  let imgs = "";
  (c.imgs||[]).forEach(img=>{
    imgs += `<img src="${img}">`;
  });

  document.getElementById("imagenes").innerHTML = imgs;
}

// editar
function editar(){
  if(actual===null) return;

  let c = canciones[actual];

  tab("editor");

  document.getElementById("titulo").value = c.titulo;
  document.getElementById("texto").value = c.texto;
  imgsTemp = c.imgs || [];

  canciones.splice(actual,1);
  localStorage.setItem("canciones", JSON.stringify(canciones));

  mostrar();
}

// borrar
function borrar(){
  if(actual===null) return;

  canciones.splice(actual,1);
  localStorage.setItem("canciones", JSON.stringify(canciones));

  document.getElementById("visor").innerHTML="";
  document.getElementById("imagenes").innerHTML="";

  mostrar();
}

// pegar imágenes
document.addEventListener("paste", e=>{
  let items = e.clipboardData.items;

  for(let i=0;i<items.length;i++){
    if(items[i].type.includes("image")){
      let file = items[i].getAsFile();
      let reader = new FileReader();

      reader.onload = ev=>{
        imgsTemp.push(ev.target.result);
      };

      reader.readAsDataURL(file);
    }
  }
});

mostrar();
</script>

</body>
</html>
