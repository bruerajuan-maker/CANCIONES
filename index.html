<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cancionero PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; padding: 10px; }

#editorTexto {
  border:1px solid #ccc;
  height: 70vh;
  padding:10px;
  background:white;
  position: relative;
  overflow:auto;
}

img.libre {
  position: absolute;
  max-width: 150px;
  cursor: move;
}

.cancion {
  padding: 5px;
  border-bottom: 1px solid #ccc;
}
</style>
</head>

<body>

<h2>🎸 Cancionero</h2>

<button onclick="tab('editor')">Editor</button>
<button onclick="tab('lista')">Cancionero</button>

<div id="editor">
  <input id="titulo" placeholder="Título"><br><br>

  <p>📷 Pegá imagen (CTRL+V) y arrastrala</p>

  <div id="editorTexto" contenteditable="true"></div>

  <br>
  <button onclick="guardar()">Guardar</button>
</div>

<div id="lista" style="display:none;">
  <div id="canciones"></div>
  <div id="visor"></div>

  <button onclick="editar()">Editar</button>
  <button onclick="borrar()">Borrar</button>
</div>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBluLvO5UfzfMcadDfKtr30U3jhxsfBJKQ",
  authDomain: "cancionero-f0c5b.firebaseapp.com",
  projectId: "cancionero-f0c5b",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let actualID = null;
let moviendo = null;

// pestañas
function tab(t){
  editor.style.display = t==="editor"?"block":"none";
  lista.style.display = t==="lista"?"block":"none";
}

// pegar imagen SIN duplicar
editorTexto.addEventListener("paste", e=>{
  e.preventDefault();

  let items = e.clipboardData.items;

  for(let item of items){
    if(item.type.includes("image")){
      let file = item.getAsFile();
      let reader = new FileReader();

      reader.onload = ev=>{
        let img = document.createElement("img");
        img.src = ev.target.result;
        img.className = "libre";

        img.style.left = "50px";
        img.style.top = "50px";

        editorTexto.appendChild(img);
      };

      reader.readAsDataURL(file);
    }
  }
});

// mover imagen (SIMPLE Y FUNCIONA)
editorTexto.addEventListener("mousedown", e=>{
  if(e.target.tagName==="IMG"){
    moviendo = e.target;
  }
});

document.addEventListener("mousemove", e=>{
  if(!moviendo) return;

  let rect = editorTexto.getBoundingClientRect();

  moviendo.style.left = (e.clientX - rect.left - 50) + "px";
  moviendo.style.top = (e.clientY - rect.top - 50) + "px";
});

document.addEventListener("mouseup", ()=>{
  moviendo = null;
});

// guardar
function guardar(){
  let titulo = document.getElementById("titulo").value;
  let texto = editorTexto.innerHTML;

  if(!titulo || !texto) return;

  db.collection("canciones").add({ titulo, texto });

  titulo.value="";
  editorTexto.innerHTML="";
}

// lista
db.collection("canciones").onSnapshot(snapshot=>{
  canciones.innerHTML="";

  snapshot.forEach(doc=>{
    let d = doc.data();

    let div=document.createElement("div");
    div.className="cancion";

    div.innerHTML=`${d.titulo}
    <button onclick="ver('${doc.id}')">Abrir</button>`;

    canciones.appendChild(div);
  });
});

// ver
function ver(id){
  db.collection("canciones").doc(id).get().then(doc=>{
    actualID=id;
    visor.innerHTML=doc.data().texto;
  });
}

// borrar
function borrar(){
  if(!actualID) return;
  db.collection("canciones").doc(actualID).delete();
  visor.innerHTML="";
}

// editar
function editar(){
  if(!actualID) return;

  tab("editor");

  db.collection("canciones").doc(actualID).get().then(doc=>{
    let d = doc.data();

    titulo.value=d.titulo;
    editorTexto.innerHTML=d.texto;
  });

  db.collection("canciones").doc(actualID).delete();
}
</script>

</body>
</html>
