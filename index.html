<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bloc PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; padding:10px; }

#barra { background:#ddd; padding:5px; }

#editor {
  border:1px solid #ccc;
  height:70vh;
  padding:10px;
  margin-top:5px;
  overflow:auto;
}

#visor {
  border:1px solid #ccc;
  margin-top:10px;
  padding:10px;
}

/* FULLSCREEN */
.fullscreen {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  z-index:9999;
  padding:40px;
  font-size:26px;
  overflow:auto;
}

#salirFull {
  position: fixed;
  top:10px;
  right:10px;
  background:red;
  color:white;
  padding:10px;
  display:none;
  z-index:10000;
}

button { margin:2px; }

.cancion {
  padding:5px;
  border-bottom:1px solid #ccc;
}

.tabBtn {
  padding:8px;
  border:1px solid #ccc;
  cursor:pointer;
  display:inline-block;
}

.tabActiva {
  background:black;
  color:white;
}
</style>
</head>

<body>

<h2>📝 Bloc PRO</h2>

<!-- SOLAPAS -->
<div>
  <span class="tabBtn tabActiva" onclick="cambiarTab('editorTab', this)">Editor</span>
  <span class="tabBtn" onclick="cambiarTab('cancionesTab', this)">Canciones</span>
</div>

<!-- EDITOR -->
<div id="editorTab">

<div id="barra">
  <button onclick="nuevo()">Nuevo</button>
  <button onclick="guardar()">Guardar</button>

  <br><br>

  <button onclick="cmd('bold')">B</button>
  <button onclick="cmd('italic')">I</button>
  <button onclick="cmd('underline')">U</button>

  <input type="color" onchange="color(this.value)">
  <input type="number" placeholder="Tamaño" onchange="size(this.value)">
</div>

<input id="titulo" placeholder="Título"><br><br>

<div id="editor" contenteditable="true"></div>

</div>

<!-- CANCIONES -->
<div id="cancionesTab" style="display:none;">

<div id="canciones"></div>

<div id="visor"></div>

<br>
<button onclick="pantallaCompleta()">Pantalla completa</button>
<button onclick="salirPantalla()">Salir</button>

<br><br>
<button onclick="editar()">Editar</button>
<button onclick="borrar()">Borrar</button>

</div>

<button id="salirFull" onclick="salirPantalla()">SALIR</button>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBluLvO5UfzfMcadDfKtr30U3jhxsfBJKQ",
  authDomain: "cancionero-f0c5b.firebaseapp.com",
  projectId: "cancionero-f0c5b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let actualID=null;
let actualData=null;

// tabs
function cambiarTab(id, btn){
  editorTab.style.display="none";
  cancionesTab.style.display="none";

  document.querySelectorAll(".tabBtn").forEach(b=>b.classList.remove("tabActiva"));

  document.getElementById(id).style.display="block";
  btn.classList.add("tabActiva");
}

// texto
function cmd(c){ document.execCommand(c,false,null); }

function color(c){
  document.execCommand("foreColor", false, c);
}

function size(s){
  document.execCommand("fontSize", false, "7");
  let f=document.getElementsByTagName("font");
  for(let x of f){
    if(x.size=="7"){
      x.removeAttribute("size");
      x.style.fontSize=s+"px";
    }
  }
}

// nuevo
function nuevo(){
  if(confirm("¿Borrar todo?")){
    editor.innerHTML="";
    titulo.value="";
  }
}

// guardar
function guardar(){
  let t=titulo.value;
  let texto=editor.innerHTML;

  if(!t||!texto) return;

  db.collection("canciones").add({
    titulo:t,
    texto:texto
  });

  editor.innerHTML="";
  titulo.value="";
}

// lista
db.collection("canciones").onSnapshot(snapshot=>{
  canciones.innerHTML="";

  snapshot.forEach(doc=>{
    let d=doc.data();

    let div=document.createElement("div");
    div.className="cancion";

    div.innerHTML=`<b>${d.titulo}</b>
    <button onclick="ver('${doc.id}')">Abrir</button>`;

    canciones.appendChild(div);
  });
});

// ver
function ver(id){
  db.collection("canciones").doc(id).get().then(doc=>{
    actualID=id;
    actualData=doc.data();

    visor.innerHTML=actualData.texto;
  });
}

// FULLSCREEN
function pantallaCompleta(){
  visor.classList.add("fullscreen");
  salirFull.style.display="block";
}

function salirPantalla(){
  visor.classList.remove("fullscreen");
  salirFull.style.display="none";
}

// ESC para salir
document.addEventListener("keydown", e=>{
  if(e.key==="Escape") salirPantalla();
});

// borrar
function borrar(){
  if(!actualID) return;
  db.collection("canciones").doc(actualID).delete();
  visor.innerHTML="";
}

// editar
function editar(){
  if(!actualID) return;

  cambiarTab('editorTab', document.querySelectorAll(".tabBtn")[0]);

  titulo.value=actualData.titulo;
  editor.innerHTML=actualData.texto;

  db.collection("canciones").doc(actualID).delete();
}
</script>

</body>
</html>
