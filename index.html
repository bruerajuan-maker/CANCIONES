<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mi Cancionero PRO</title>
<style>
body { font-family: Arial; padding: 10px; }

.tabs button {
  padding: 10px;
  margin: 5px;
}

textarea {
  width: 100%;
  height: 300px;
}

.cancion {
  cursor: pointer;
  border-bottom: 1px solid #ccc;
  padding: 5px;
}

#visor {
  white-space: pre-wrap;
  border: 1px solid #ccc;
  padding: 10px;
  height: 400px;
  overflow-y: auto;
  font-size: 18px;
}

</style>
</head>
<body>

<h2>🎸 Mi Cancionero</h2>

<div class="tabs">
  <button onclick="mostrarTab('editor')">Editor</button>
  <button onclick="mostrarTab('cancionero')">Cancionero</button>
</div>

<!-- EDITOR -->
<div id="editor">
  <input id="titulo" placeholder="Nombre de la canción">
  <textarea id="contenido" placeholder="Pegá letra + acordes"></textarea>
  <button onclick="guardar()">Guardar</button>
</div>

<!-- CANCIONERO -->
<div id="cancionero" style="display:none;">

  <div id="canciones"></div>

  <hr>

  Tamaño letra:
  <input type="range" min="12" max="40" value="18" oninput="cambiarTamaño(this.value)">

  <br><br>

  Velocidad scroll:
  <input type="range" min="10" max="200" value="80" id="velocidad">

  <br>

  <button onclick="autoScroll()">▶ Auto Scroll</button>
  <button onclick="detenerScroll()">⏹ Parar</button>

  <div id="visor"></div>

</div>

<script>
let canciones = JSON.parse(localStorage.getItem("canciones")) || [];
let scrollInterval;

function mostrarTab(tab) {
  document.getElementById("editor").style.display = tab === "editor" ? "block" : "none";
  document.getElementById("cancionero").style.display = tab === "cancionero" ? "block" : "none";
}

function guardar() {
  let titulo = document.getElementById("titulo").value;
  let contenido = document.getElementById("contenido").value;

  if (!titulo || !contenido) return;

  canciones.push({ titulo, contenido });
  localStorage.setItem("canciones", JSON.stringify(canciones));

  document.getElementById("titulo").value = "";
  document.getElementById("contenido").value = "";

  mostrar();
}

function mostrar() {
  let html = "";

  canciones.forEach((c, i) => {
    html += `<div class="cancion" onclick="ver(${i})">${c.titulo}</div>`;
  });

  document.getElementById("canciones").innerHTML = html;
}

function ver(i) {
  document.getElementById("visor").innerText = canciones[i].contenido;
}

function cambiarTamaño(size) {
  document.getElementById("visor").style.fontSize = size + "px";
}

function autoScroll() {
  detenerScroll();

  let velocidad = document.getElementById("velocidad").value;

  scrollInterval = setInterval(() => {
    document.getElementById("visor").scrollTop += 1;
  }, velocidad);
}

function detenerScroll() {
  clearInterval(scrollInterval);
}

mostrar();
</script>

</body>
</html>
