<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cancionero PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; padding: 10px; }

/* CONTENEDOR EDITOR */
#editorContainer {
  display: flex;
  gap: 10px;
}

/* TEXTO */
#editorTexto {
  flex: 2;
  border:1px solid #ccc;
  height: 70vh;
  padding:10px;
  background:white;
  overflow:auto;
}

/* IMAGENES */
#panelImagenes {
  flex: 1;
  border:1px solid #ccc;
  height: 70vh;
  padding:10px;
  background:#f5f5f5;
  overflow:auto;
}

.imgItem {
  max-width: 100%;
  margin-bottom:10px;
  cursor: pointer;
}

/* VISOR */
#visor {
  border:1px solid #ccc;
  padding:20px;
  margin-top:10px;
  height: 70vh;
  overflow:auto;
  font-size:20px;
  display:flex;
  gap:10px;
}

#visorTexto {
  flex:2;
}

#visorImgs {
  flex:1;
}

button { margin: 3px; }

.cancion {
  padding: 5px;
  border-bottom: 1px solid #ccc;
}
</style>
</head>

<body>

<h2>🎸 Cancionero PRO</h2>

<button onclick="tab('editor')">Editor</button>
<button onclick="tab('lista')">Cancionero</button>

<!-- EDITOR -->
<div id="editor">

<input id="titulo" placeholder="Título"><br><br>

<button onclick="cmd('bold')">B</button>
<button onclick="cmd('italic')">I</button>
<button onclick="cmd('underline')">U</button>

<input type="color" onchange="cmdColor(this.value)">
<input type="number" placeholder="Tamaño" onchange="cmdSize(this.value)">

<br><br>

<div id="editorContainer">

<div id="editorTexto" contenteditable="true"></div>

<div id="panelImagenes">
  <p>📷 Pegá imágenes acá (CTRL+V)</p>
</div>

</div>

<br>
<button onclick="guardar()">Guardar</button>

</div>

<!-- LISTA -->
<div id="lista" style="display:none;">

<div id="canciones"></div>

<div id="visor">
  <div id="visorTexto"></div>
  <div id="visorImgs"></div>
</div>

<br>
<button onclick="editar()">Editar</button>
<button onclick="borrar()">Borrar</button>

</div>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBluLvO5UfzfMcadDfKtr30U3jhxsfBJKQ",
  authDomain: "cancionero-f0c5b.firebaseapp.com",
  projectId: "cancionero-f0c5b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let actualID=null;
let actualData=null;

// tabs
function tab(t){
  editor.style.display = t==="editor"?"block":"none";
  lista.style.display = t==="lista"?"block":"none";
}

// texto
function cmd(c){ document.execCommand(c,false,null); }
function cmdColor(color){ document.execCommand("foreColor", false, color); }

function cmdSize(size){
  document.execCommand("fontSize", false, "7");
  let fonts=document.getElementsByTagName("font");
  for(let f of fonts){
    if(f.size=="7"){
      f.removeAttribute("size");
      f.style.fontSize=size+"px";
    }
  }
}

// 📷 PEGAR IMAGEN SOLO EN PANEL DERECHO
panelImagenes.addEventListener("paste", e=>{
  let items = e.clipboardData.items;

  for(let item of items){
    if(item.type.includes("image")){
      e.preventDefault();

      let file = item.getAsFile();
      let reader = new FileReader();

      reader.onload = ev=>{
        let img = document.createElement("img");
        img.src = ev.target.result;
        img.className="imgItem";

        panelImagenes.appendChild(img);
      };

      reader.readAsDataURL(file);
    }
  }
});

// guardar
function guardar(){
  let titulo = tituloInput.value;
  let texto = editorTexto.innerHTML;

  let imgs = [];
  document.querySelectorAll("#panelImagenes img").forEach(i=>{
    imgs.push(i.src);
  });

  if(!titulo||!texto) return;

  db.collection("canciones").add({titulo,texto,imgs});

  tituloInput.value="";
  editorTexto.innerHTML="";
  panelImagenes.innerHTML="📷 Pegá imágenes acá";
}

// lista
db.collection("canciones").onSnapshot(snapshot=>{
  cancionesDiv.innerHTML="";

  snapshot.forEach(doc=>{
    let d=doc.data();

    let div=document.createElement("div");
    div.className="cancion";

    div.innerHTML=`<b>${d.titulo}</b>
    <button onclick="ver('${doc.id}')">Abrir</button>`;

    cancionesDiv.appendChild(div);
  });
});

// ver
function ver(id){
  db.collection("canciones").doc(id).get().then(doc=>{
    actualID=id;
    actualData=doc.data();

    visorTexto.innerHTML = actualData.texto;

    visorImgs.innerHTML="";
    if(actualData.imgs){
      actualData.imgs.forEach(src=>{
        let img=document.createElement("img");
        img.src=src;
        img.style.maxWidth="100%";
        visorImgs.appendChild(img);
      });
    }
  });
}

// borrar
function borrar(){
  if(!actualID) return;
  db.collection("canciones").doc(actualID).delete();
}

// editar
function editar(){
  if(!actualID) return;

  tab("editor");

  tituloInput.value=actualData.titulo;
  editorTexto.innerHTML=actualData.texto;

  panelImagenes.innerHTML="";
  if(actualData.imgs){
    actualData.imgs.forEach(src=>{
      let img=document.createElement("img");
      img.src=src;
      img.className="imgItem";
      panelImagenes.appendChild(img);
    });
  }

  db.collection("canciones").doc(actualID).delete();
}

// refs
let tituloInput=document.getElementById("titulo");
let cancionesDiv=document.getElementById("canciones");
let editorTexto=document.getElementById("editorTexto");
let panelImagenes=document.getElementById("panelImagenes");
let visorTexto=document.getElementById("visorTexto");
let visorImgs=document.getElementById("visorImgs");
</script>

</body>
</html>
