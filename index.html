<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Buscador de canciones</title>
<style>
body {
  font-family: Arial;
  padding: 20px;
}

input {
  padding: 10px;
  width: 70%;
}

button {
  padding: 10px;
}

.resultado {
  margin-top: 10px;
  padding: 10px;
  border-bottom: 1px solid #ccc;
  cursor: pointer;
}
</style>
</head>
<body>

<h2>🎸 Buscar canciones</h2>

<input id="busqueda" placeholder="Ej: los piojos">
<button onclick="buscar()">Buscar</button>

<div id="resultados"></div>

<script>
async function buscar() {
  let q = document.getElementById("busqueda").value;

  let res = await fetch("https://api.lyrics.ovh/suggest/" + q);
  let data = await res.json();

  let html = "";

  data.data.slice(0, 10).forEach(c => {
    html += `<div class="resultado" onclick="abrir('${c.artist.name}','${c.title}')">
      ${c.artist.name} - ${c.title}
    </div>`;
  });

  document.getElementById("resultados").innerHTML = html;
}

function abrir(artista, tema) {
  let busqueda = artista + " " + tema + " acordes";
  let url = "https://www.google.com/search?q=" + encodeURIComponent(busqueda);
  window.open(url, "_blank");
}
</script>

</body>
</html>
