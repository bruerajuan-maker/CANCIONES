<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cancionero PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; padding: 10px; }

/* BOTONES */
button { margin: 3px; }

/* EDITOR GRANDE */
#editorTexto {
  border:1px solid #ccc;
  height: 70vh; /* 🔥 altura proporcional */
  padding:10px;
  background:white;
  overflow:auto;
}

/* LISTA */
.cancion {
  padding: 5px;
  border-bottom: 1px solid #ccc;
}

/* VISOR */
#visor {
  border:1px solid #ccc;
  padding:10px;
  margin-top:10px;
}

/* IMAGENES */
#editorTexto img {
  max-width: 200px;
  cursor: pointer;
  display:block;
  margin:10px 0;
}
</style>
</head>

<body>

<h2>🎸 Cancionero PRO</h2>

<button onclick="tab('editor')">Editor</button>
<button onclick="tab('lista')">Cancionero</button>

<!-- EDITOR -->
<div id="editor">

<input id="titulo" placeholder="Título"><br><br>

<!-- herramientas -->
<button onclick="cmd('bold')">B</button>
<button onclick="cmd('italic')">I</button>
<button onclick="cmd('underline')">U</button>

<input type="color" onchange="cmdColor(this.value)">
<input type="number" placeholder="Tamaño" onchange="cmdSize(this.value)">

<br><br>

<!-- IMAGEN CONTROLES -->
<button onclick="alinear('left')">⬅️ Izq</button>
<button onclick="alinear('center')">⬜ Centro</button>
<button onclick="alinear('right')">➡️ Der</button>

<button onclick="frente()">⬆️ Frente</button>
<button onclick="fondo()">⬇️ Fondo</button>

<p>📷 Pegá imágenes con CTRL + V y luego HACÉ CLICK en la imagen</p>

<div id="editorTexto" contenteditable="true"></div>

<br>
<button onclick="guardar()">Guardar</button>

</div>

<!-- CANCIONERO -->
<div id="lista" style="display:none;">
  <div id="canciones"></div>

  <div id="visor"></div>

  <br>
  <button onclick="editar()">✏️ Editar</button>
  <button onclick="borrar()">❌ Borrar</button>
</div>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBluLvO5UfzfMcadDfKtr30U3jhxsfBJKQ",
  authDomain: "cancionero-f0c5b.firebaseapp.com",
  projectId: "cancionero-f0c5b",
  storageBucket: "cancionero-f0c5b.firebasestorage.app",
  messagingSenderId: "80051908948",
  appId: "1:80051908948:web:0b8a3b337df740299358c1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let actualID = null;
let actualData = null;
let imgSeleccionada = null;

// pestañas
function tab(t){
  editor.style.display = t==="editor"?"block":"none";
  lista.style.display = t==="lista"?"block":"none";
}

// comandos texto
function cmd(c){
  document.execCommand(c,false,null);
}

function cmdColor(color){
  document.execCommand("foreColor", false, color);
}

function cmdSize(size){
  document.execCommand("fontSize", false, "7");

  let fonts = document.getElementsByTagName("font");
  for(let i=0;i<fonts.length;i++){
    if(fonts[i].size=="7"){
      fonts[i].removeAttribute("size");
      fonts[i].style.fontSize = size+"px";
    }
  }
}

// 🔥 seleccionar imagen
document.addEventListener("click", function(e){
  if(e.target.tagName==="IMG"){
    imgSeleccionada = e.target;
    alert("Imagen seleccionada");
  }
});

// mover imagen
function alinear(pos){
  if(!imgSeleccionada) return;

  imgSeleccionada.style.display = "block";
  imgSeleccionada.style.margin = "10px auto";

  if(pos==="left"){
    imgSeleccionada.style.margin = "10px 0";
  }
  if(pos==="right"){
    imgSeleccionada.style.margin = "10px 0 10px auto";
  }
}

// traer adelante
function frente(){
  if(!imgSeleccionada) return;
  imgSeleccionada.style.position = "relative";
  imgSeleccionada.style.zIndex = 10;
}

// mandar atrás
function fondo(){
  if(!imgSeleccionada) return;
  imgSeleccionada.style.position = "relative";
  imgSeleccionada.style.zIndex = 0;
}

// guardar
function guardar(){
  let titulo = tituloInput.value;
  let texto = editorTexto.innerHTML;

  if(!titulo || !texto) return;

  db.collection("canciones").add({
    titulo: titulo,
    texto: texto
  });

  tituloInput.value="";
  editorTexto.innerHTML="";
}

// lista
db.collection("canciones").onSnapshot(snapshot => {
  cancionesDiv.innerHTML = "";

  snapshot.forEach(doc => {
    let data = doc.data();

    let div = document.createElement("div");
    div.className = "cancion";

    div.innerHTML = `
      <b>${data.titulo}</b>
      <button onclick="ver('${doc.id}')">Abrir</button>
    `;

    cancionesDiv.appendChild(div);
  });
});

// ver
function ver(id){
  db.collection("canciones").doc(id).get().then(doc => {
    actualID = id;
    actualData = doc.data();

    visor.innerHTML = actualData.texto;
  });
}

// borrar
function borrar(){
  if(!actualID) return;

  db.collection("canciones").doc(actualID).delete();
  visor.innerHTML="";
}

// editar
function editar(){
  if(!actualID) return;

  tab("editor");

  tituloInput.value = actualData.titulo;
  editorTexto.innerHTML = actualData.texto;

  db.collection("canciones").doc(actualID).delete();
}

// refs
let tituloInput = document.getElementById("titulo");
let cancionesDiv = document.getElementById("canciones");
let visor = document.getElementById("visor");
let editorTexto = document.getElementById("editorTexto");
</script>

</body>
</html>
