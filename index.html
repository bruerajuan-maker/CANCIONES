<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cancionero PRO</title>

<style>
body { font-family: Arial; padding: 10px; }

.tabs button { padding: 10px; margin: 5px; }

textarea {
  width: 100%;
  height: 350px;
}

.cancion {
  padding: 5px;
  border-bottom: 1px solid #ccc;
}

#contenedor {
  display: flex;
  gap: 20px;
}

#visor {
  flex: 2;
  white-space: pre-wrap;
  border: 1px solid #ccc;
  padding: 10px;
  height: 400px;
  overflow-y: auto;
}

#imagenesPreview {
  flex: 1;
}

img {
  max-width: 100%;
  margin-bottom: 10px;
}

.acorde {
  font-weight: bold;
}

@media print {
  body * { display: none; }
  #printArea, #printArea * { display: block; }
}
</style>
</head>

<body>

<h2>🎸 Cancionero</h2>

<div class="tabs">
  <button onclick="tab('editor')">Editor</button>
  <button onclick="tab('lista')">Cancionero</button>
</div>

<!-- EDITOR -->
<div id="editor">
  <input id="titulo" placeholder="Título"><br><br>
  <textarea id="texto"></textarea>
  <p>📷 Pegá imágenes con CTRL + V</p>
  <button onclick="guardar()">Guardar</button>

  <h3>Vista previa</h3>
  <div id="previewTexto"></div>
  <div id="previewImg"></div>
</div>

<!-- LISTA -->
<div id="lista" style="display:none;">

  Color acordes:
  <input type="color" id="color" value="#ff0000" onchange="renderActual()">

  <div id="canciones"></div>

  <hr>

  <div id="printArea">
    <div id="contenedor">
      <div id="visor"></div>
      <div id="imagenesPreview"></div>
    </div>
  </div>

  <button onclick="imprimir()">🖨 PDF</button>

</div>

<script>
let canciones = JSON.parse(localStorage.getItem("canciones")) || [];
let actual = null;
let imgsTemp = [];

// tabs
function tab(t){
  editor.style.display = t==="editor"?"block":"none";
  lista.style.display = t==="lista"?"block":"none";
}

// guardar
function guardar(){
  let titulo = tituloInput.value;
  let texto = textoArea.value;

  if(!titulo || !texto) return;

  canciones.push({titulo,texto,imgs:imgsTemp});
  localStorage.setItem("canciones", JSON.stringify(canciones));

  imgsTemp = [];
  tituloInput.value="";
  textoArea.value="";
  actualizar();
}

// mostrar lista
function actualizar(){
  cancionesDiv.innerHTML = "";

  canciones.forEach((c,i)=>{
    cancionesDiv.innerHTML += `
    <div class="cancion">
      <b onclick="ver(${i})">${c.titulo}</b>
      <button onclick="editar(${i})">✏️</button>
      <button onclick="borrar(${i})">❌</button>
    </div>`;
  });
}

// ver
function ver(i){
  actual = i;
  renderActual();
}

// render canción
function renderActual(){
  if(actual===null) return;

  let c = canciones[actual];
  let color = document.getElementById("color").value;

  visor.innerHTML = c.texto.replace(/\[(.*?)\]/g,
    `<span class="acorde" style="color:${color}">[$1]</span>`);

  imagenesPreview.innerHTML="";
  (c.imgs||[]).forEach(img=>{
    imagenesPreview.innerHTML += `<img src="${img}">`;
  });
}

// editar
function editar(i){
  let c = canciones[i];
  tab("editor");

  tituloInput.value = c.titulo;
  textoArea.value = c.texto;
  imgsTemp = c.imgs || [];

  canciones.splice(i,1);
  localStorage.setItem("canciones", JSON.stringify(canciones));
  actualizar();
}

// borrar
function borrar(i){
  canciones.splice(i,1);
  localStorage.setItem("canciones", JSON.stringify(canciones));
  actualizar();
  visor.innerHTML="";
  imagenesPreview.innerHTML="";
}

// imprimir
function imprimir(){
  window.print();
}

// pegar imagen
document.addEventListener("paste", e=>{
  let items = e.clipboardData.items;

  for(let i=0;i<items.length;i++){
    if(items[i].type.includes("image")){
      let file = items[i].getAsFile();
      let reader = new FileReader();

      reader.onload = ev=>{
        imgsTemp.push(ev.target.result);

        // preview inmediato
        previewImg.innerHTML += `<img src="${ev.target.result}">`;
      };

      reader.readAsDataURL(file);
    }
  }
});

// preview texto en vivo
textoArea.addEventListener("input", ()=>{
  previewTexto.innerText = textoArea.value;
});

let tituloInput = document.getElementById("titulo");
let textoArea = document.getElementById("texto");
let cancionesDiv = document.getElementById("canciones");
let visor = document.getElementById("visor");
let imagenesPreview = document.getElementById("imagenesPreview");

actualizar();
</script>

</body>
</html>
