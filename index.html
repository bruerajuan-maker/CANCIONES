<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mi Cancionero PRO</title>
<style>
body { font-family: Arial; padding: 10px; }

.tabs button { padding: 10px; margin: 5px; }

textarea {
  width: 100%;
  height: 400px;
  font-size: 16px;
}

.cancion {
  cursor: pointer;
  border-bottom: 1px solid #ccc;
  padding: 5px;
}

#visor {
  white-space: pre-wrap;
  border: 1px solid #ccc;
  padding: 10px;
  height: 400px;
  overflow-y: auto;
  font-size: 18px;
}

.acorde {
  color: red;
  font-weight: bold;
}

img {
  max-width: 100%;
  margin: 10px 0;
}

/* SOLO IMPRIMIR CANCIÓN */
@media print {
  body * { display: none; }
  #zonaImprimir, #zonaImprimir * { display: block; }
}
</style>
</head>
<body>

<h2>🎸 Mi Cancionero</h2>

<div class="tabs">
  <button onclick="mostrarTab('editor')">Editor</button>
  <button onclick="mostrarTab('cancionero')">Cancionero</button>
</div>

<!-- EDITOR -->
<div id="editor">
  <input id="titulo" placeholder="Nombre de la canción">
  <textarea id="contenido" placeholder="Pegá letra + acordes ([Am])"></textarea>

  <p>📷 Pegá imágenes con CTRL + V</p>

  <button onclick="guardar()">Guardar</button>
</div>

<!-- CANCIONERO -->
<div id="cancionero" style="display:none;">

  <div id="canciones"></div>

  <hr>

  Tamaño letra:
  <input type="range" min="12" max="40" value="18" oninput="cambiarTamaño(this.value)">

  <br><br>

  Color acordes:
  <input type="color" onchange="cambiarColor(this.value)">

  <br><br>

  <button onclick="imprimir()">🖨 PDF / Imprimir</button>

  <div id="zonaImprimir">
    <div id="visor"></div>
    <div id="imagenes"></div>
  </div>

  <br>

  <button onclick="editar()">✏️ Editar</button>
  <button onclick="borrar()">❌ Borrar</button>

</div>

<script>
let canciones = JSON.parse(localStorage.getItem("canciones")) || [];
let actual = null;
let imagenesTemp = [];
let colorAcordes = "red";

function mostrarTab(tab) {
  document.getElementById("editor").style.display = tab === "editor" ? "block" : "none";
  document.getElementById("cancionero").style.display = tab === "cancionero" ? "block" : "none";
}

function guardar() {
  let titulo = document.getElementById("titulo").value;
  let contenido = document.getElementById("contenido").value;

  if (!titulo || !contenido) return;

  canciones.push({ titulo, contenido, imagenes: imagenesTemp });

  localStorage.setItem("canciones", JSON.stringify(canciones));

  imagenesTemp = [];

  document.getElementById("titulo").value = "";
  document.getElementById("contenido").value = "";

  mostrar();
}

function mostrar() {
  let html = "";

  canciones.forEach((c, i) => {
    html += `<div class="cancion" onclick="ver(${i})">${c.titulo}</div>`;
  });

  document.getElementById("canciones").innerHTML = html;
}

function formatear(texto) {
  return texto.replace(/\[(.*?)\]/g, `<span class="acorde" style="color:${colorAcordes}">[$1]</span>`);
}

function ver(i) {
  actual = i;

  document.getElementById("visor").innerHTML = formatear(canciones[i].contenido);

  let imgs = "";
  (canciones[i].imagenes || []).forEach(img => {
    imgs += `<img src="${img}">`;
  });

  document.getElementById("imagenes").innerHTML = imgs;
}

function cambiarTamaño(size) {
  document.getElementById("visor").style.fontSize = size + "px";
}

function cambiarColor(color) {
  colorAcordes = color;
  if (actual !== null) ver(actual);
}

function editar() {
  if (actual === null) return;

  mostrarTab('editor');

  document.getElementById("titulo").value = canciones[actual].titulo;
  document.getElementById("contenido").value = canciones[actual].contenido;

  canciones.splice(actual, 1);
  localStorage.setItem("canciones", JSON.stringify(canciones));
  mostrar();
}

function borrar() {
  if (actual === null) return;

  canciones.splice(actual, 1);
  localStorage.setItem("canciones", JSON.stringify(canciones));

  document.getElementById("visor").innerHTML = "";
  document.getElementById("imagenes").innerHTML = "";

  mostrar();
}

function imprimir() {
  window.print();
}

/* PEGAR IMAGENES */
document.addEventListener("paste", function(e) {
  let items = e.clipboardData.items;

  for (let i = 0; i < items.length; i++) {
    if (items[i].type.indexOf("image") !== -1) {
      let blob = items[i].getAsFile();
      let reader = new FileReader();

      reader.onload = function(event) {
        imagenesTemp.push(event.target.result);
      };

      reader.readAsDataURL(blob);
    }
  }
});

mostrar();
</script>

</body>
</html>
