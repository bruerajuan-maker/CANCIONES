<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cancionero</title>
<style>
body {
  font-family: monospace;
  padding: 20px;
}

textarea {
  width: 100%;
  height: 150px;
  font-size: 16px;
}

button {
  margin-top: 10px;
  padding: 10px;
}

pre {
  background: #f4f4f4;
  padding: 10px;
  white-space: pre-wrap;
}
</style>
</head>
<body>

<h2>🎸 Cancionero</h2>

<textarea id="texto" placeholder="Pegá o escribí la canción acá"></textarea>

<br>

<input id="acorde" placeholder="Ej: Am">
<button onclick="insertar()">Insertar acorde</button>

<h3>Vista</h3>
<pre id="vista"></pre>

<script>
function insertar() {
  let texto = document.getElementById("texto");
  let acorde = document.getElementById("acorde").value;

  let inicio = texto.selectionStart;

  let nuevo =
    texto.value.substring(0, inicio) +
    "[" + acorde + "]" +
    texto.value.substring(inicio);

  texto.value = nuevo;

  mostrar();
}

function mostrar() {
  let t = document.getElementById("texto").value;

  let salida = "";
  let lineaAcordes = "";
  let lineaTexto = "";

  for (let i = 0; i < t.length; i++) {
    if (t[i] === "[") {
      let fin = t.indexOf("]", i);
      let acorde = t.substring(i + 1, fin);

      lineaAcordes += acorde.padEnd(4, " ");
      i = fin;
    } else {
      lineaTexto += t[i];
      lineaAcordes += " ";
    }

    if (t[i] === "\n") {
      salida += lineaAcordes + "\n" + lineaTexto + "\n";
      lineaAcordes = "";
      lineaTexto = "";
    }
  }

  salida += lineaAcordes + "\n" + lineaTexto;

  document.getElementById("vista").innerText = salida;
}

document.getElementById("texto").addEventListener("input", mostrar);
</script>

</body>
</html>
