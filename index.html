<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bloc PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; padding:10px; }

#barra {
  background:#ddd;
  padding:5px;
}

#editor {
  border:1px solid #ccc;
  height:70vh;
  padding:10px;
  margin-top:5px;
  overflow:auto;
}

#visor {
  border:1px solid #ccc;
  margin-top:10px;
  padding:10px;
}

button { margin:2px; }

.cancion {
  padding:5px;
  border-bottom:1px solid #ccc;
}
</style>
</head>

<body>

<h2>📝 Bloc PRO</h2>

<div id="barra">

<button onclick="nuevo()">Nuevo</button>
<button onclick="guardar()">Guardar</button>

<br><br>

<button onclick="cmd('bold')">B</button>
<button onclick="cmd('italic')">I</button>
<button onclick="cmd('underline')">U</button>

<input type="color" onchange="color(this.value)">
<input type="number" placeholder="Tamaño" onchange="size(this.value)">

</div>

<input id="titulo" placeholder="Título"><br><br>

<div id="editor" contenteditable="true"></div>

<hr>

<h3>Cancionero</h3>

<div id="canciones"></div>

<div id="visor"></div>

<br>
<button onclick="editar()">Editar</button>
<button onclick="borrar()">Borrar</button>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBluLvO5UfzfMcadDfKtr30U3jhxsfBJKQ",
  authDomain: "cancionero-f0c5b.firebaseapp.com",
  projectId: "cancionero-f0c5b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let actualID=null;
let actualData=null;

// comandos texto
function cmd(c){
  document.execCommand(c,false,null);
}

function color(c){
  document.execCommand("foreColor", false, c);
}

function size(s){
  document.execCommand("fontSize", false, "7");
  let f=document.getElementsByTagName("font");
  for(let x of f){
    if(x.size=="7"){
      x.removeAttribute("size");
      x.style.fontSize=s+"px";
    }
  }
}

// nuevo
function nuevo(){
  if(confirm("¿Borrar todo?")){
    editor.innerHTML="";
    titulo.value="";
  }
}

// guardar
function guardar(){
  let t=titulo.value;
  let texto=editor.innerHTML;

  if(!t||!texto) return;

  db.collection("canciones").add({
    titulo:t,
    texto:texto
  });

  editor.innerHTML="";
  titulo.value="";
}

// lista
db.collection("canciones").onSnapshot(snapshot=>{
  canciones.innerHTML="";

  snapshot.forEach(doc=>{
    let d=doc.data();

    let div=document.createElement("div");
    div.className="cancion";

    div.innerHTML=`<b>${d.titulo}</b>
    <button onclick="ver('${doc.id}')">Abrir</button>`;

    canciones.appendChild(div);
  });
});

// ver
function ver(id){
  db.collection("canciones").doc(id).get().then(doc=>{
    actualID=id;
    actualData=doc.data();

    visor.innerHTML=actualData.texto;
  });
}

// borrar
function borrar(){
  if(!actualID) return;
  db.collection("canciones").doc(actualID).delete();
  visor.innerHTML="";
}

// editar
function editar(){
  if(!actualID) return;

  titulo.value=actualData.titulo;
  editor.innerHTML=actualData.texto;

  db.collection("canciones").doc(actualID).delete();
}
</script>

</body>
</html>
