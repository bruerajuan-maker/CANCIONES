<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mi Cancionero</title>
<style>
body { font-family: Arial; padding: 20px; }

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}

button {
  padding: 10px;
  margin: 5px 0;
}

.cancion {
  cursor: pointer;
  border-bottom: 1px solid #ccc;
  padding: 5px;
}
</style>
</head>
<body>

<h2>🎸 Mi Cancionero</h2>

<input id="titulo" placeholder="Nombre de la canción">

<textarea id="contenido" rows="8" placeholder="Pegá letra + acordes"></textarea>

<button onclick="guardar()">Guardar canción</button>

<h3>Mis canciones</h3>
<div id="lista"></div>

<h3>Ver canción</h3>
<pre id="visor"></pre>

<script>
let canciones = JSON.parse(localStorage.getItem("canciones")) || [];

function guardar() {
  let titulo = document.getElementById("titulo").value;
  let contenido = document.getElementById("contenido").value;

  if (!titulo || !contenido) return;

  canciones.push({ titulo, contenido });
  localStorage.setItem("canciones", JSON.stringify(canciones));

  document.getElementById("titulo").value = "";
  document.getElementById("contenido").value = "";

  mostrar();
}

function mostrar() {
  let html = "";

  canciones.forEach((c, i) => {
    html += `<div class="cancion" onclick="ver(${i})">${c.titulo}</div>`;
  });

  document.getElementById("lista").innerHTML = html;
}

function ver(i) {
  document.getElementById("visor").innerText = canciones[i].contenido;
}

mostrar();
</script>

</body>
</html>
