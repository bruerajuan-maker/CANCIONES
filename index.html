<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cancionero</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; padding: 10px; }

#editorTexto {
  border:1px solid #ccc;
  height: 70vh;
  padding:10px;
  background:white;
  overflow:auto;
}

#visor {
  border:1px solid #ccc;
  padding:20px;
  margin-top:10px;
  height: 70vh;
  overflow:auto;
  font-size:20px;
}

.fullscreen {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  z-index:9999;
  padding:40px;
  font-size:28px;
}

#salirFull {
  position: fixed;
  top:10px;
  right:10px;
  background:red;
  color:white;
  padding:10px;
  display:none;
  z-index:10000;
}

.cancion {
  padding: 5px;
  border-bottom: 1px solid #ccc;
}

button { margin: 3px; }
</style>
</head>

<body>

<h2>🎸 Cancionero</h2>

<button onclick="tab('editor')">Editor</button>
<button onclick="tab('lista')">Cancionero</button>

<!-- EDITOR -->
<div id="editor">

<input id="titulo" placeholder="Título"><br><br>

<button onclick="cmd('bold')">B</button>
<button onclick="cmd('italic')">I</button>
<button onclick="cmd('underline')">U</button>

<input type="color" onchange="cmdColor(this.value)">
<input type="number" placeholder="Tamaño" onchange="cmdSize(this.value)">

<div id="editorTexto" contenteditable="true"></div>

<br>
<button onclick="guardar()">Guardar</button>

</div>

<!-- LISTA -->
<div id="lista" style="display:none;">

<div id="canciones"></div>

<div id="visor"></div>

<br>
<button onclick="pantallaCompleta()">Pantalla completa</button>
<button onclick="salirPantalla()">Salir</button>

<br><br>
<button onclick="editar()">Editar</button>
<button onclick="borrar()">Borrar</button>

</div>

<button id="salirFull" onclick="salirPantalla()">SALIR</button>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBluLvO5UfzfMcadDfKtr30U3jhxsfBJKQ",
  authDomain: "cancionero-f0c5b.firebaseapp.com",
  projectId: "cancionero-f0c5b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let actualID=null;
let actualData=null;

// pestañas
function tab(t){
  editor.style.display = t==="editor"?"block":"none";
  lista.style.display = t==="lista"?"block":"none";
}

// texto
function cmd(c){ document.execCommand(c,false,null); }
function cmdColor(color){ document.execCommand("foreColor", false, color); }

function cmdSize(size){
  document.execCommand("fontSize", false, "7");
  let fonts=document.getElementsByTagName("font");
  for(let f of fonts){
    if(f.size=="7"){
      f.removeAttribute("size");
      f.style.fontSize=size+"px";
    }
  }
}

// guardar
function guardar(){
  let titulo=tituloInput.value;
  let texto=editorTexto.innerHTML;

  if(!titulo||!texto) return;

  db.collection("canciones").add({titulo,texto});

  tituloInput.value="";
  editorTexto.innerHTML="";
}

// lista
db.collection("canciones").onSnapshot(snapshot=>{
  cancionesDiv.innerHTML="";

  snapshot.forEach(doc=>{
    let d=doc.data();

    let div=document.createElement("div");
    div.className="cancion";

    div.innerHTML=`<b>${d.titulo}</b>
    <button onclick="ver('${doc.id}')">Abrir</button>`;

    cancionesDiv.appendChild(div);
  });
});

// ver
function ver(id){
  db.collection("canciones").doc(id).get().then(doc=>{
    actualID=id;
    actualData=doc.data();
    visor.innerHTML=actualData.texto;
  });
}

// fullscreen
function pantallaCompleta(){
  visor.classList.add("fullscreen");
  salirFull.style.display="block";
}

function salirPantalla(){
  visor.classList.remove("fullscreen");
  salirFull.style.display="none";
}

document.addEventListener("keydown", e=>{
  if(e.key==="Escape") salirPantalla();
});

// borrar
function borrar(){
  if(!actualID) return;
  db.collection("canciones").doc(actualID).delete();
  visor.innerHTML="";
}

// editar
function editar(){
  if(!actualID) return;

  tab("editor");

  tituloInput.value=actualData.titulo;
  editorTexto.innerHTML=actualData.texto;

  db.collection("canciones").doc(actualID).delete();
}

// refs
let tituloInput=document.getElementById("titulo");
let cancionesDiv=document.getElementById("canciones");
let visor=document.getElementById("visor");
let editorTexto=document.getElementById("editorTexto");
</script>

</body>
</html>
