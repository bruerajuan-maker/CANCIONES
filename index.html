<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cancionero PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial; padding: 10px; }

/* editor */
#editorTexto {
  border:1px solid #ccc;
  height: 60vh;
  padding:10px;
  background:white;
  overflow:auto;
}

/* imagenes */
#imagenes {
  margin-top:10px;
}

.imgItem {
  max-width:150px;
  margin:5px;
}

/* visor */
#visor {
  border:1px solid #ccc;
  padding:20px;
  margin-top:10px;
  height: 70vh;
  overflow:auto;
  font-size:20px;
}

button { margin: 3px; }

.cancion {
  padding: 5px;
  border-bottom: 1px solid #ccc;
}
</style>
</head>

<body>

<h2>🎸 Cancionero PRO</h2>

<button onclick="tab('editor')">Editor</button>
<button onclick="tab('lista')">Cancionero</button>

<!-- EDITOR -->
<div id="editor">

<input id="titulo" placeholder="Título"><br><br>

<button onclick="cmd('bold')">B</button>
<button onclick="cmd('italic')">I</button>
<button onclick="cmd('underline')">U</button>

<input type="color" onchange="cmdColor(this.value)">
<input type="number" placeholder="Tamaño" onchange="cmdSize(this.value)">

<br><br>

<div id="editorTexto" contenteditable="true"></div>

<br>

<input type="file" id="fileInput" accept="image/*">

<div id="imagenes"></div>

<br>
<button onclick="guardar()">Guardar</button>

</div>

<!-- LISTA -->
<div id="lista" style="display:none;">

<div id="canciones"></div>

<div id="visor"></div>

<br>
<button onclick="editar()">Editar</button>
<button onclick="borrar()">Borrar</button>

</div>

<script>
// firebase
const firebaseConfig = {
  apiKey: "AIzaSyBluLvO5UfzfMcadDfKtr30U3jhxsfBJKQ",
  authDomain: "cancionero-f0c5b.firebaseapp.com",
  projectId: "cancionero-f0c5b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let actualID=null;
let actualData=null;

// tabs
function tab(t){
  editor.style.display = t==="editor"?"block":"none";
  lista.style.display = t==="lista"?"block":"none";
}

// texto
function cmd(c){ document.execCommand(c,false,null); }
function cmdColor(color){ document.execCommand("foreColor", false, color); }

function cmdSize(size){
  document.execCommand("fontSize", false, "7");
  let fonts=document.getElementsByTagName("font");
  for(let f of fonts){
    if(f.size=="7"){
      f.removeAttribute("size");
      f.style.fontSize=size+"px";
    }
  }
}

// cargar imagen
fileInput.addEventListener("change", e=>{
  let file = e.target.files[0];
  if(!file) return;

  let reader = new FileReader();

  reader.onload = ev=>{
    let img=document.createElement("img");
    img.src=ev.target.result;
    img.className="imgItem";

    imagenes.appendChild(img);
  };

  reader.readAsDataURL(file);
});

// guardar
function guardar(){
  let titulo=tituloInput.value;
  let texto=editorTexto.innerHTML;

  let imgs=[];
  document.querySelectorAll("#imagenes img").forEach(i=>{
    imgs.push(i.src);
  });

  if(!titulo||!texto) return;

  db.collection("canciones").add({titulo,texto,imgs});

  tituloInput.value="";
  editorTexto.innerHTML="";
  imagenes.innerHTML="";
}

// lista
db.collection("canciones").onSnapshot(snapshot=>{
  cancionesDiv.innerHTML="";

  snapshot.forEach(doc=>{
    let d=doc.data();

    let div=document.createElement("div");
    div.className="cancion";

    div.innerHTML=`<b>${d.titulo}</b>
    <button onclick="ver('${doc.id}')">Abrir</button>`;

    cancionesDiv.appendChild(div);
  });
});

// ver
function ver(id){
  db.collection("canciones").doc(id).get().then(doc=>{
    actualID=id;
    actualData=doc.data();

    visor.innerHTML=actualData.texto;

    if(actualData.imgs){
      actualData.imgs.forEach(src=>{
        let img=document.createElement("img");
        img.src=src;
        img.style.maxWidth="200px";
        visor.appendChild(img);
      });
    }
  });
}

// borrar
function borrar(){
  if(!actualID) return;
  db.collection("canciones").doc(actualID).delete();
}

// editar
function editar(){
  if(!actualID) return;

  tab("editor");

  tituloInput.value=actualData.titulo;
  editorTexto.innerHTML=actualData.texto;

  imagenes.innerHTML="";
  if(actualData.imgs){
    actualData.imgs.forEach(src=>{
      let img=document.createElement("img");
      img.src=src;
      img.className="imgItem";
      imagenes.appendChild(img);
    });
  }

  db.collection("canciones").doc(actualID).delete();
}

// refs
let tituloInput=document.getElementById("titulo");
let cancionesDiv=document.getElementById("canciones");
let editorTexto=document.getElementById("editorTexto");
let imagenes=document.getElementById("imagenes");
let fileInput=document.getElementById("fileInput");
let visor=document.getElementById("visor");
</script>

</body>
</html>
